name: Pipeline CI/CD - Innovatech Chile

# El pipeline se activa únicamente al hacer push en la rama deploy exigida por la pauta
on:
  push:
    branches:
      - deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código del repositorio en el servidor de GitHub
      - name: Checkout del codigo
        uses: actions/checkout@v4

      # 2. Configurar las credenciales de AWS usando los Secrets que guardamos
      - name: Configurar credenciales de AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # 3. Autenticarse en Docker Hub de forma segura
      # NOTA: Como no hemos creado DOCKERHUB_USERNAME ni TOKEN en tus secretos,
      # comentamos este paso para que no falle y compile directo de forma local en tu EC2.
      # - name: Iniciar sesion en Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Desplegar de forma directa construyendo las imagenes dentro de tu AWS EC2
      - name: Despliegue automatico en AWS EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 34.207.71.210 # <-- Pon aquí la IP pública real de tu instancia Frontend
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ec2-user/proyecto
            cd /home/ec2-user/proyecto
            # Si tienes el código clonado en la instancia, puedes forzar un pull o copia:
            sudo docker-compose down
            sudo docker-compose up --build -d